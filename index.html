<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새 탭</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary:#202124;--bg-secondary:#303134;--bg-tertiary:#3c4043;--bg-hover:#404347;
    --text-primary:#e8eaed;--text-secondary:#9aa0a6;--text-muted:#6e7479;
    --accent:#8ab4f8;--accent-hover:#aecbfa;--accent-dim:rgba(138,180,248,0.12);
    --danger:#f28b82;--danger-dim:rgba(242,139,130,0.12);
    --success:#81c995;--success-dim:rgba(129,201,149,0.15);
    --warning:#fdd663;--warning-dim:rgba(253,214,99,0.15);
    --border:#5f6368;--shadow:rgba(0,0,0,0.4);--radius:12px;--radius-sm:8px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg-primary);color:var(--text-primary);font-family:'Outfit','Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-y:auto;}

  /* Auth */
  .auth-bar{position:fixed;top:12px;right:16px;z-index:50;display:flex;align-items:center;gap:10px;}
  .auth-bar .user-name{font-size:12px;color:var(--text-secondary);}
  .auth-bar .user-avatar{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid var(--bg-tertiary);}
  .btn-auth{padding:6px 16px;background:var(--accent);color:#202124;border:none;border-radius:20px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s;}
  .btn-auth:hover{background:var(--accent-hover);}
  .btn-auth.logout{background:var(--bg-tertiary);color:var(--text-secondary);font-weight:400;}
  .btn-auth.logout:hover{background:var(--bg-hover);}
  .sync-badge{font-size:11px;color:var(--success);display:flex;align-items:center;gap:4px;}
  .sync-badge::before{content:'';width:6px;height:6px;background:var(--success);border-radius:50%;display:inline-block;}

  /* Bookmark */
  .bookmark-bar{margin-top:48px;margin-bottom:40px;display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:0 16px;}
  .bm-pill{display:inline-flex;align-items:center;gap:7px;padding:7px 16px;background:var(--bg-secondary);border:1px solid var(--bg-tertiary);border-radius:20px;text-decoration:none;color:var(--text-secondary);font-size:13px;font-family:inherit;transition:all .15s;white-space:nowrap;}
  .bm-pill:hover{background:var(--bg-tertiary);color:var(--text-primary);border-color:var(--border);box-shadow:0 1px 4px var(--shadow);}
  .bm-emoji{font-size:15px;line-height:1;}

  /* Search */
  .search-container{margin-top:0;margin-bottom:36px;width:100%;max-width:584px;position:relative;}
  .search-logo{text-align:center;margin-bottom:28px;font-size:64px;font-weight:700;letter-spacing:-2px;background:linear-gradient(135deg,#4285f4 0%,#ea4335 25%,#fbbc05 50%,#34a853 75%,#4285f4 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .search-bar{width:100%;height:48px;background:var(--bg-secondary);border:1px solid var(--bg-tertiary);border-radius:24px;display:flex;align-items:center;padding:0 18px;transition:all .2s ease;cursor:text;}
  .search-bar:hover,.search-bar:focus-within{background:var(--bg-tertiary);border-color:var(--border);box-shadow:0 2px 8px var(--shadow);}
  .search-icon{color:var(--text-secondary);margin-right:12px;flex-shrink:0;}
  .search-bar input{flex:1;background:none;border:none;outline:none;color:var(--text-primary);font-size:16px;font-family:inherit;}
  .search-bar input::placeholder{color:var(--text-secondary);}

  /* Shortcuts */
  .shortcuts-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;max-width:680px;margin-bottom:44px;padding:0 16px;}
  .shortcut{display:flex;flex-direction:column;align-items:center;width:96px;text-decoration:none;cursor:pointer;border-radius:var(--radius);padding:12px 4px;transition:background .15s;}
  .shortcut:hover{background:var(--bg-secondary);}
  .shortcut-icon{width:48px;height:48px;border-radius:50%;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;margin-bottom:8px;overflow:hidden;}
  .shortcut-icon img{width:24px;height:24px;border-radius:2px;}
  .shortcut-label{font-size:12px;color:var(--text-secondary);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;}

  /* ── Quest Section ── */
  .quest-section{width:100%;max-width:640px;margin-bottom:36px;padding:0 16px;}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 4px;}
  .section-title{font-size:16px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:8px;}
  .section-title svg{color:var(--accent);}
  .quest-count{font-size:12px;color:var(--text-muted);background:var(--bg-secondary);padding:3px 10px;border-radius:12px;}
  .btn-quest-add{padding:5px 14px;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(138,180,248,0.25);border-radius:20px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s;}
  .btn-quest-add:hover{background:var(--accent);color:#202124;border-color:var(--accent);}

  .quest-cards{display:flex;flex-direction:column;gap:8px;max-height:310px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg-tertiary) transparent;}
  .quest-cards::-webkit-scrollbar{width:5px;}
  .quest-cards::-webkit-scrollbar-thumb{background:var(--bg-tertiary);border-radius:4px;}

  .quest-card{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg-secondary);border-radius:var(--radius);border-left:4px solid var(--accent);transition:all .15s;animation:slideIn .2s ease;}
  .quest-card:hover{background:var(--bg-hover);}
  .quest-card.p1{border-left-color:#f28b82;}
  .quest-card.p2{border-left-color:#fdd663;}
  .quest-card.p3{border-left-color:#8ab4f8;}
  .quest-card.p4{border-left-color:var(--border);}
  .quest-card.due-today{background:rgba(242,139,130,0.1);}
  .quest-card.due-tomorrow{background:rgba(253,214,99,0.08);}

  .quest-priority{font-size:11px;font-weight:700;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .quest-card.p1 .quest-priority{background:rgba(242,139,130,0.2);color:var(--danger);}
  .quest-card.p2 .quest-priority{background:rgba(253,214,99,0.2);color:var(--warning);}
  .quest-card.p3 .quest-priority{background:var(--accent-dim);color:var(--accent);}
  .quest-card.p4 .quest-priority{background:var(--bg-tertiary);color:var(--text-muted);}

  .quest-body{flex:1;min-width:0;}
  .quest-text{font-size:14px;color:var(--text-primary);line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .quest-due{font-size:11px;color:var(--text-muted);margin-top:3px;}
  .quest-card.due-today .quest-due{color:var(--danger);font-weight:600;}
  .quest-card.due-tomorrow .quest-due{color:var(--warning);font-weight:600;}

  .btn-quest-done{padding:5px 12px;background:var(--success-dim);color:var(--success);border:none;border-radius:16px;font-size:11px;font-family:inherit;cursor:pointer;transition:all .15s;flex-shrink:0;font-weight:600;}
  .btn-quest-done:hover{background:var(--success);color:#202124;}

  .quest-empty{text-align:center;padding:28px 16px;color:var(--text-muted);font-size:14px;}

  /* Quest Add Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center;}
  .modal-overlay.active{display:flex;}
  .modal{background:var(--bg-secondary);border-radius:var(--radius);padding:24px;width:420px;max-width:90vw;box-shadow:0 8px 32px var(--shadow);}
  .modal h3{font-size:16px;margin-bottom:16px;}
  .modal label{display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px;}
  .modal input,.modal select{width:100%;height:38px;background:var(--bg-primary);border:1px solid var(--bg-tertiary);border-radius:var(--radius-sm);padding:0 12px;color:var(--text-primary);font-size:14px;font-family:inherit;outline:none;margin-bottom:14px;transition:border-color .2s;}
  .modal input:focus,.modal select:focus{border-color:var(--accent);}
  .modal select option{background:var(--bg-primary);color:var(--text-primary);}
  .modal-row{display:flex;gap:12px;}
  .modal-row>div{flex:1;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px;}
  .modal-actions button{padding:8px 20px;border:none;border-radius:var(--radius-sm);font-size:14px;font-family:inherit;cursor:pointer;transition:all .15s;}
  .btn-cancel{background:var(--bg-tertiary);color:var(--text-primary);}.btn-cancel:hover{background:var(--bg-hover);}
  .btn-save{background:var(--accent);color:#202124;font-weight:600;}.btn-save:hover{background:var(--accent-hover);}

  /* ── Daily To-Do ── */
  .todo-section{width:100%;max-width:640px;margin-bottom:60px;padding:0 16px;}
  .todo-input-row{display:flex;gap:8px;margin-bottom:12px;}
  .todo-input-row input{flex:1;height:42px;background:var(--bg-secondary);border:1px solid var(--bg-tertiary);border-radius:var(--radius-sm);padding:0 14px;color:var(--text-primary);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;}
  .todo-input-row input:focus{border-color:var(--accent);}
  .todo-input-row input::placeholder{color:var(--text-muted);}
  .btn-add{height:42px;padding:0 18px;background:var(--accent);color:#202124;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s;white-space:nowrap;}
  .btn-add:hover{background:var(--accent-hover);}
  .todo-list{display:flex;flex-direction:column;gap:4px;}
  .todo-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-secondary);border-radius:var(--radius-sm);transition:all .15s;animation:slideIn .2s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
  .todo-item:hover{background:var(--bg-hover);}
  .todo-item.done{opacity:.5;}.todo-item.done .todo-text{text-decoration:line-through;color:var(--text-muted);}
  .todo-checkbox{width:20px;height:20px;border:2px solid var(--border);border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .todo-checkbox:hover{border-color:var(--accent);}
  .todo-item.done .todo-checkbox{background:var(--success-dim);border-color:var(--success);}
  .todo-checkbox svg{display:none;}.todo-item.done .todo-checkbox svg{display:block;color:var(--success);}
  .todo-text{flex:1;font-size:14px;color:var(--text-primary);line-height:1.4;}
  .btn-delete{width:28px;height:28px;background:none;border:none;border-radius:50%;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s;flex-shrink:0;}
  .todo-item:hover .btn-delete{opacity:1;}
  .btn-delete:hover{background:var(--danger-dim);color:var(--danger);}
  .todo-empty{text-align:center;padding:24px 16px;color:var(--text-muted);font-size:14px;}
</style>
</head>
<body>
<div class="auth-bar" id="authBar"><button class="btn-auth" onclick="doLogin()">Google 로그인</button></div>

<div class="bookmark-bar">
  <a class="bm-pill" href="https://gemini.google.com"><span class="bm-emoji">❇️</span>Gemini</a>
  <a class="bm-pill" href="https://claude.ai"><span class="bm-emoji">🌟</span>Claude</a>
  <a class="bm-pill" href="https://console.cloud.google.com/welcome?project=my-start-page-a48c0"><span class="bm-emoji">🖥️</span>GCP</a>
  <a class="bm-pill" href="https://www.overleaf.com"><span class="bm-emoji">📝</span>Overleaf-LaTeX</a>
  <a class="bm-pill" href="https://github.com"><span class="bm-emoji">🐱</span>GitHub</a>
</div>

<div class="search-container">
  <div class="search-logo">Google</div>
  <div class="search-bar" onclick="this.querySelector('input').focus()">
    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Google 검색 또는 URL 입력" autocomplete="off">
  </div>
</div>

<div class="shortcuts-grid" id="shortcutsGrid"></div>

<!-- Quest -->
<div class="quest-section">
  <div class="section-header">
    <div class="section-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Quest
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="quest-count" id="questCount">0개</span>
      <button class="btn-quest-add" onclick="openQuestModal()">+ 추가</button>
    </div>
  </div>
  <div class="quest-cards" id="questCards"></div>
</div>

<!-- Shortcut Edit Modal -->
<div class="modal-overlay" id="shortcutModal" onclick="if(event.target===this)closeShortcutModal()">
  <div class="modal">
    <h3>바로가기 수정</h3>
    <label>이름</label><input type="text" id="scName" placeholder="사이트 이름">
    <label>URL</label><input type="text" id="scUrl" placeholder="https://example.com">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeShortcutModal()">취소</button>
      <button class="btn-save" onclick="saveShortcutEdit()">저장</button>
    </div>
  </div>
</div>

<!-- Quest Modal -->
<div class="modal-overlay" id="questModal" onclick="if(event.target===this)closeQuestModal()">
  <div class="modal">
    <h3>새 Quest 추가</h3>
    <label>Task</label>
    <input type="text" id="questText" placeholder="해야 할 일을 입력하세요..." autocomplete="off">
    <div class="modal-row">
      <div>
        <label>Due Date</label>
        <input type="date" id="questDue">
      </div>
      <div>
        <label>우선순위</label>
        <select id="questPriority">
          <option value="1">P1 — 긴급</option>
          <option value="2">P2 — 높음</option>
          <option value="3" selected>P3 — 보통</option>
          <option value="4">P4 — 낮음</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeQuestModal()">취소</button>
      <button class="btn-save" onclick="addQuest()">추가</button>
    </div>
  </div>
</div>

<!-- Daily To-Do -->
<div class="todo-section">
  <div class="section-header">
    <div class="section-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Daily To-Do
    </div>
    <span class="quest-count" id="todoCount">0개 남음</span>
  </div>
  <div class="todo-input-row">
    <input type="text" id="todoInput" placeholder="매일 할 일을 입력하세요..." autocomplete="off">
    <button class="btn-add" onclick="addTodo()">추가</button>
  </div>
  <div class="todo-list" id="todoList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
// ── Firebase ──
firebase.initializeApp({
  apiKey:"AIzaSyAyJeoagSPBBI7mprJTOEeimLYthL-4KoY",
  authDomain:"my-start-page-a48c0.firebaseapp.com",
  databaseURL:"https://my-start-page-a48c0-default-rtdb.firebaseio.com",
  projectId:"my-start-page-a48c0",
  storageBucket:"my-start-page-a48c0.firebasestorage.app",
  messagingSenderId:"676989045728",
  appId:"1:676989045728:web:4c1eb8ba12fcc04b0eb985"
});
const auth=firebase.auth(),dbFB=firebase.database();
let currentUser=null,dbRef=null;

// ── Shortcuts (10 fixed slots, right-click to edit name/url) ──
const DEFAULT_SHORTCUTS=[
  {name:'Gmail',url:'https://mail.google.com',icon:'https://www.google.com/s2/favicons?domain=mail.google.com&sz=64'},
  {name:'Calendar',url:'https://calendar.google.com',icon:'__CAL__'},
  {name:'네이버',url:'https://www.naver.com',icon:'https://www.google.com/s2/favicons?domain=naver.com&sz=64'},
  {name:'YouTube',url:'https://www.youtube.com',icon:'https://www.google.com/s2/favicons?domain=youtube.com&sz=64'},
  {name:'경희포탈',url:'https://portal.khu.ac.kr',icon:'https://www.google.com/s2/favicons?domain=khu.ac.kr&sz=64'},
  {name:'경희의대도서관',url:'https://library.khu.ac.kr',icon:'https://www.google.com/s2/favicons?domain=library.khu.ac.kr&sz=64'},
  {name:'드라이브',url:'https://drive.google.com',icon:'https://www.google.com/s2/favicons?domain=drive.google.com&sz=64'},
  {name:'Google Colab',url:'https://colab.research.google.com',icon:'https://www.google.com/s2/favicons?domain=colab.research.google.com&sz=64'},
  {name:'K 창업지원센터',url:'https://startup.khu.ac.kr',icon:'https://www.google.com/s2/favicons?domain=khu.ac.kr&sz=64'},
  {name:'iBrainnet',url:'https://www.ibrainnet.com',icon:'https://www.google.com/s2/favicons?domain=ibrainnet.com&sz=64'},
];

// ── State ──
let shortcuts=[...DEFAULT_SHORTCUTS], quests=[], todos=[], editingIdx=-1;

// ── Storage ──
function saveData(){
  const d={shortcuts,quests,todos,lastdate:getKSTDateString()};
  localStorage.setItem('hp_data',JSON.stringify(d));
  if(dbRef) dbRef.set(d);
}
function loadLocal(){
  try{const d=JSON.parse(localStorage.getItem('hp_data'));
    if(d){if(d.shortcuts)shortcuts=d.shortcuts;if(d.quests)quests=d.quests;if(d.todos)todos=d.todos;checkReset(d.lastdate);}
  }catch(e){}
}
function loadSnap(snap){
  const d=snap.val();
  if(d){if(d.shortcuts)shortcuts=d.shortcuts;else shortcuts=[...DEFAULT_SHORTCUTS];if(d.quests)quests=d.quests;else quests=[];if(d.todos)todos=d.todos;else todos=[];checkReset(d.lastdate);
    localStorage.setItem('hp_data',JSON.stringify(d));}
  renderAll();
}

// ── Auth ──
function doLogin(){auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>alert('로그인 실패: '+e.message));}
function doLogout(){auth.signOut();}
auth.onAuthStateChanged(u=>{
  currentUser=u;const bar=document.getElementById('authBar');
  if(u){
    dbRef=dbFB.ref('users/'+u.uid);
    bar.innerHTML=`<span class="sync-badge">동기화됨</span><span class="user-name">${u.displayName||u.email}</span>${u.photoURL?`<img class="user-avatar" src="${u.photoURL}" title="로그아웃" onclick="doLogout()">`:''}<button class="btn-auth logout" onclick="doLogout()">로그아웃</button>`;
    dbRef.on('value',loadSnap);
  }else{
    if(dbRef){dbRef.off();dbRef=null;}
    bar.innerHTML='<button class="btn-auth" onclick="doLogin()">Google 로그인</button>';
    loadLocal();renderAll();
  }
});

// ── Search ──
document.getElementById('searchInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){const q=e.target.value.trim();if(!q)return;
  if(/^https?:\/\//i.test(q)||/^[a-z0-9-]+\.[a-z]{2,}/i.test(q)){window.location.href=q.startsWith('http')?q:'https://'+q;}
  else{window.location.href='https://www.google.com/search?q='+encodeURIComponent(q);}}
});

// ── Calendar Icon ──
function calIcon(){
  const c=document.createElement('canvas');c.width=64;c.height=64;const x=c.getContext('2d'),d=new Date().getDate().toString();
  x.fillStyle='#fff';x.beginPath();x.roundRect(4,4,56,56,8);x.fill();
  x.fillStyle='#4285f4';x.beginPath();x.roundRect(4,4,56,15,[8,8,0,0]);x.fill();
  x.strokeStyle='#5f6368';x.lineWidth=3.5;x.lineCap='round';x.beginPath();x.moveTo(22,2);x.lineTo(22,12);x.moveTo(42,2);x.lineTo(42,12);x.stroke();
  x.fillStyle='#3c4043';x.font='bold 28px "Outfit",sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText(d,32,40);
  return c.toDataURL();
}

// ── Shortcuts (fixed 10 slots, right-click to edit) ──
function renderShortcuts(){
  const g=document.getElementById('shortcutsGrid');g.innerHTML='';
  shortcuts.forEach((s,i)=>{const a=document.createElement('a');a.className='shortcut';a.href=s.url;
    const ic=s.icon==='__CAL__'?calIcon():s.icon;
    a.innerHTML=`<div class="shortcut-icon"><img src="${ic}" alt="" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22><text y=%2218%22 font-size=%2216%22>${s.name[0]}</text></svg>'"></div><span class="shortcut-label">${s.name}</span>`;
    a.addEventListener('contextmenu',e=>{e.preventDefault();openShortcutModal(i);});
    g.appendChild(a);});
}
function openShortcutModal(i){
  editingIdx=i;
  document.getElementById('scName').value=shortcuts[i].name;
  document.getElementById('scUrl').value=shortcuts[i].url;
  document.getElementById('shortcutModal').classList.add('active');
  document.getElementById('scName').focus();
}
function closeShortcutModal(){document.getElementById('shortcutModal').classList.remove('active');}
function saveShortcutEdit(){
  const n=document.getElementById('scName').value.trim();
  let u=document.getElementById('scUrl').value.trim();
  if(!n||!u)return;
  if(!/^https?:\/\//i.test(u))u='https://'+u;
  const ic='https://www.google.com/s2/favicons?domain='+new URL(u).hostname+'&sz=64';
  shortcuts[editingIdx]={name:n,url:u,icon:ic};
  saveData();renderShortcuts();closeShortcutModal();
}

// ── Quest ──
function openQuestModal(){
  document.getElementById('questText').value='';
  document.getElementById('questDue').value='';
  document.getElementById('questPriority').value='3';
  document.getElementById('questModal').classList.add('active');
  document.getElementById('questText').focus();
}
function closeQuestModal(){document.getElementById('questModal').classList.remove('active');}

function addQuest(){
  const text=document.getElementById('questText').value.trim();
  const due=document.getElementById('questDue').value;
  const pri=parseInt(document.getElementById('questPriority').value);
  if(!text)return;
  quests.push({id:Date.now(),text,due:due||null,priority:pri});
  saveData();renderQuests();closeQuestModal();
}

function completeQuest(id){
  quests=quests.filter(q=>q.id!==id);
  saveData();renderQuests();
}

function getDDay(dueStr){
  if(!dueStr)return null;
  const now=new Date();const kst=new Date(now.getTime()+(9*3600000));
  const today=kst.toISOString().slice(0,10);
  const diff=Math.ceil((new Date(dueStr)-new Date(today))/(86400000));
  return diff;
}

function formatDDay(dueStr){
  const d=getDDay(dueStr);
  if(d===null)return '';
  if(d<0)return `D+${Math.abs(d)} (지남)`;
  if(d===0)return 'D-Day';
  return `D-${d}`;
}

function renderQuests(){
  const c=document.getElementById('questCards');
  // Sort: priority asc, then due date asc (null last)
  const sorted=[...quests].sort((a,b)=>{
    if(a.priority!==b.priority)return a.priority-b.priority;
    if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return -1;
    return a.due.localeCompare(b.due);
  });

  document.getElementById('questCount').textContent=quests.length+'개';

  if(!sorted.length){c.innerHTML='<div class="quest-empty">Quest를 추가해 보세요</div>';return;}

  c.innerHTML=sorted.map(q=>{
    const dd=getDDay(q.due);
    let cls=`quest-card p${q.priority}`;
    if(dd===0)cls+=' due-today';
    else if(dd===1)cls+=' due-tomorrow';
    const dueLabel=q.due?`${q.due} (${formatDDay(q.due)})`:'기한 없음';
    return `<div class="${cls}">
      <div class="quest-priority">P${q.priority}</div>
      <div class="quest-body">
        <div class="quest-text">${escapeHtml(q.text)}</div>
        <div class="quest-due">${dueLabel}</div>
      </div>
      <button class="btn-quest-done" onclick="completeQuest(${q.id})">완료</button>
    </div>`;
  }).join('');
}

// ── Daily To-Do ──
function getKSTDateString(){const n=new Date();return new Date(n.getTime()+(9*3600000)).toISOString().slice(0,10);}
function checkReset(last){if(last&&last!==getKSTDateString())todos.forEach(t=>{t.done=false;});}

function addTodo(){
  const inp=document.getElementById('todoInput'),t=inp.value.trim();if(!t)return;
  todos.push({id:Date.now(),text:t,done:false});
  inp.value='';saveData();renderTodos();
}
document.getElementById('todoInput').addEventListener('keydown',e=>{if(e.key==='Enter')addTodo();});

function toggleTodo(id){const t=todos.find(t=>t.id===id);if(t)t.done=!t.done;saveData();renderTodos();}
function deleteTodo(id){todos=todos.filter(t=>t.id!==id);saveData();renderTodos();}

function renderTodos(){
  const l=document.getElementById('todoList');
  document.getElementById('todoCount').textContent=todos.filter(t=>!t.done).length+'개 남음';
  if(!todos.length){l.innerHTML='<div class="todo-empty">매일 할 일을 추가해 보세요</div>';return;}
  l.innerHTML=todos.map(t=>`<div class="todo-item ${t.done?'done':''}">
    <div class="todo-checkbox" onclick="toggleTodo(${t.id})"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg></div>
    <span class="todo-text">${escapeHtml(t.text)}</span>
    <button class="btn-delete" onclick="deleteTodo(${t.id})" title="삭제"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>`).join('');
}

// ── Helpers ──
setInterval(()=>{checkReset(getKSTDateString());renderTodos();},60000);
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function renderAll(){renderShortcuts();renderQuests();renderTodos();}

// ── Init ──
loadLocal();renderAll();
</script>
